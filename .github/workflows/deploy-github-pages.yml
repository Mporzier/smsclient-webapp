# Déploie le dossier smsclient/ sur GitHub Pages (export statique Next.js).
# Prérequis : Settings → Pages → Source = « GitHub Actions ».
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: smsclient/pnpm-lock.yaml

      - name: Install
        working-directory: smsclient
        run: pnpm install --frozen-lockfile

      # Secrets : Settings → Secrets and variables → Actions → Repository secrets
      # (pas seulement « Environment » : le job build n’utilise pas environment:)
      #
      # Pages : Settings → Pages → Source = « GitHub Actions ». Si la source est une
      # branche (gh-pages / main), ce workflow ne sert pas et tu vois un vieux build.
      - name: Vérifier que les secrets Supabase sont bien injectés (longueurs seulement)
        working-directory: smsclient
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          set -e
          ulen="${#NEXT_PUBLIC_SUPABASE_URL}"
          klen="${#NEXT_PUBLIC_SUPABASE_ANON_KEY}"
          echo "NEXT_PUBLIC_SUPABASE_URL length=$ulen (attendu > 0)"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY length=$klen (attendu > 0)"
          if [ "$ulen" -eq 0 ] || [ "$klen" -eq 0 ]; then
            echo "::error::Secrets vides ou inaccessibles pour ce workflow. Vérifie les *Repository* secrets (pas uniquement Environment), absence de faute de frappe, et relance le workflow après les avoir créés."
            exit 1
          fi

      - name: Build static export
        working-directory: smsclient
        env:
          BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: pnpm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: smsclient/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
